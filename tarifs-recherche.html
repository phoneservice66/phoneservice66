<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:     #A200BB;
  --bg:         #000000;
  --surface:    #0f0f0f;
  --text:       #ffffff;
  --text-muted: #888888;
  --border:     rgba(162,0,187,0.2);
  --radius:     14px;
}
body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); }
.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px;
}
.search-sub {
  font-size: .92rem;
  color: var(--text-muted);
  margin-bottom: 16px;
  font-weight: 300;
}
.search-box {
  width: 100%;
  max-width: 560px;
  position: relative;
}
.search-box svg {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  pointer-events: none;
  z-index: 2;
}
#main-search {
  width: 100%;
  padding: 16px 18px 16px 52px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: "DM Sans", sans-serif;
  font-size: 1rem;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  caret-color: var(--accent);
}
#main-search::placeholder { color: var(--text-muted); }
#main-search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(162,0,187,0.15);
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}
.suggestions {
  position: absolute;
  top: 100%; left: 0; right: 0;
  background: var(--surface);
  border: 1.5px solid var(--accent);
  border-top: none;
  border-bottom-left-radius: var(--radius);
  border-bottom-right-radius: var(--radius);
  overflow: hidden;
  z-index: 100;
  box-shadow: 0 16px 40px rgba(0,0,0,0.8);
  max-height: 300px;
  overflow-y: auto;
}
.suggestions:empty { display: none; }
.suggestion-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  cursor: pointer;
  transition: background .12s;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  text-decoration: none;
  color: inherit;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: rgba(162,0,187,0.1); }
.sug-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sug-icon svg { color: #fff; }
.sug-name { font-size: .92rem; font-weight: 500; flex: 1; text-transform: capitalize; }
.sug-count { font-size: .72rem; color: var(--text-muted); }
.sug-arrow { color: var(--text-muted); opacity: .5; }
</style>
</head>
