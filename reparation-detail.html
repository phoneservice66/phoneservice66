<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:     #A200BB;
  --bg:         #000000;
  --surface:    #0f0f0f;
  --surface2:   #1a1a1a;
  --text:       #ffffff;
  --text-muted: #888888;
  --border:     rgba(255,255,255,0.07);
  --radius:     14px;
}
body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); }
.wrap { max-width: 860px; margin: 0 auto; padding: 20px 20px 60px; }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--text-muted);
  font-size: .85rem;
  font-weight: 500;
  text-decoration: none;
  margin-bottom: 28px;
  transition: color .15s;
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
}
.back-btn:hover { color: var(--accent); }

.device-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
}
.device-icon {
  width: 48px; height: 48px;
  background: var(--accent);
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.device-icon svg { color: #fff; }
.device-name {
  font-family: "Syne", sans-serif;
  font-weight: 800;
  font-size: clamp(1.2rem, 3vw, 1.7rem);
  text-transform: capitalize;
}
.device-sub { font-size: .82rem; color: var(--text-muted); margin-top: 2px; }

.legend {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: .8rem; color: var(--text-muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.eco { background: #fff; }
.dot.prime { background: #aaa; }
.dot.original { background: var(--accent); }

.price-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.price-table-header {
  display: grid;
  grid-template-columns: 1fr 90px 90px 90px;
  gap: 4px;
  padding: 10px 16px;
  background: var(--surface2);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.price-table-header span {
  font-size: .63rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  text-align: center;
  white-space: nowrap;
}
.price-table-header span:first-child { text-align: left; color: var(--text-muted); }
.price-table-header span.eco      { color: #fff; }
.price-table-header span.prime    { color: #aaa; }
.price-table-header span.original { color: var(--accent); }

.price-row {
  display: grid;
  grid-template-columns: 1fr 90px 90px 90px;
  align-items: center;
  gap: 4px;
  padding: 13px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background .15s;
  animation: fadeUp .2s ease both;
}
.price-row:last-child { border-bottom: none; }
.price-row:hover { background: rgba(255,255,255,0.02); }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(5px); }
  to   { opacity:1; transform:translateY(0); }
}
.price-row-name {
  font-size: .87rem;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 6px;
}
.price-cell {
  text-align: center;
  font-family: "Syne", sans-serif;
  font-weight: 700;
  font-size: .87rem;
  white-space: nowrap;
}
.price-cell.eco      { color: #fff; }
.price-cell.prime    { color: #aaa; }
.price-cell.original { color: var(--accent); }
.price-cell.na       { color: #444; font-size: .7rem; font-weight: 400; }

.not-found {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
  font-size: .95rem;
  line-height: 1.6;
}

.call-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 17px;
  background: var(--accent);
  border-radius: var(--radius);
  color: #fff;
  font-family: "Syne", sans-serif;
  font-weight: 700;
  font-size: 1rem;
  text-decoration: none;
  transition: opacity .2s, transform .15s;
  box-shadow: 0 4px 24px rgba(162,0,187,0.35);
}
.call-btn:hover { opacity: .9; transform: translateY(-1px); }
.call-btn-icon {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.18);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.call-btn-text { display: flex; flex-direction: column; align-items: flex-start; }
.call-btn-label { font-size: .68rem; opacity: .85; letter-spacing: .05em; text-transform: uppercase; }
.call-btn-number { font-size: 1.05rem; font-weight: 800; letter-spacing: .03em; }

@media (max-width: 500px) {
  .price-table-header, .price-row {
    grid-template-columns: 1fr 68px 68px 68px;
    padding: 10px 11px;
    gap: 3px;
  }
  .price-cell { font-size: .78rem; }
  .price-table-header span { font-size: .56rem; }
  .price-row-name { font-size: .78rem; }
}
</style>
</head>
